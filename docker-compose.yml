version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fraudlens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fraudlens_user
      POSTGRES_PASSWORD: fraudlens_password
      POSTGRES_DB: fraudlens_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudlens_user -d fraudlens_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
